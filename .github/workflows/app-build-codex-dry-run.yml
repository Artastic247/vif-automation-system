name: App Build Dry Run

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      route:
        required: true
        type: string
      replay_key:
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  dry_run:
    runs-on: ubuntu-latest
    concurrency:
      group: vif-issue-${{ inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Generate dry-run contract artifact
        run: |
          mkdir -p artifacts
          cat > artifacts/dry-run-summary.md <<MD
          # VIF App-Build Dry-Run Summary
          - Issue: #${{ inputs.issue_number }}
          - Route: ${{ inputs.route }}
          - Replay key: ${{ inputs.replay_key }}
          - Mode: dry-run
          - Result: artifact-only (no branch mutation)
          MD

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-dry-run-${{ inputs.issue_number }}
          path: artifacts/dry-run-summary.md

      - name: Comment dry-run completion
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ inputs.issue_number }}'),
              body: `Dry-run completed for replay key **${{ inputs.replay_key }}**. Artifact: app-build-dry-run-${{ inputs.issue_number }}.`
            });
