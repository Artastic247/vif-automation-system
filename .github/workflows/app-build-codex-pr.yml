name: App Build Execute

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      route:
        required: true
        type: string
      mode:
        required: true
        type: string
      readiness_decision:
        required: false
        type: string

permissions:
  contents: read

jobs:
  execute:
    runs-on: ubuntu-latest
    concurrency:
      group: vif-issue-${{ inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build handoff artifact
        run: |
          mkdir -p artifacts
          cat > artifacts/handoff-summary.md <<MD
          # App-Build Handoff Summary
          - Issue: #${{ inputs.issue_number }}
          - Route: ${{ inputs.route }}
          - Mode: ${{ inputs.mode }}
          - Readiness decision: ${{ inputs.readiness_decision || 'PASS' }}
          - Replay key: issue-${{ inputs.issue_number }}-r1
          - Mutation actions: disabled (artifact-only)
          MD

      - name: Upload handoff artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-handoff-${{ inputs.issue_number }}
          path: artifacts/handoff-summary.md
