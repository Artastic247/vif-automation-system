name: App Build PR Validation

on:
  pull_request:
    paths:
      - '.github/**'
      - 'software-build-control/**'

permissions:
  contents: read

jobs:
  intake:
    name: vif/intake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f software-build-control/01-app-build-line/CODEX_TASK_HANDOFF.md

  diff_scope:
    name: vif/diff-scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check allowed paths
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "$CHANGED"
          if echo "$CHANGED" | rg -v '^(\.github/|software-build-control/)'; then
            echo "Out-of-scope files detected"
            exit 1
          fi

  ci:
    name: vif/ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python software-build-control/scripts/validate_control_pack.py --root software-build-control --mode control-pack
