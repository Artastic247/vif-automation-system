name: AUTO-002 PR Review Station

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: startsWith(github.event.pull_request.head.ref, 'auto-issue-') || startsWith(github.event.pull_request.head.ref, 'codex-plugin-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare review inputs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json body --jq .body > pr_body.txt
          gh pr diff ${{ github.event.pull_request.number }} --name-only > changed_files.txt

      - name: Run deterministic PR review
        run: |
          python software-build-control/scripts/auto_pr_review.py \
            --repo "$GITHUB_REPOSITORY" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --head-branch "${{ github.event.pull_request.head.ref }}" \
            --title "${{ github.event.pull_request.title }}" \
            --body-file pr_body.txt \
            --changed-files-file changed_files.txt \
            --output-file auto_pr_review_result.md

      - name: Comment review result on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file auto_pr_review_result.md

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-pr-review-result
          path: auto_pr_review_result.md
