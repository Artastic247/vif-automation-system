name: Control Pack Large File Check Template
on: workflow_dispatch
jobs:
  large-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: python software-build-control/scripts/check_large_files.py --root software-build-control
