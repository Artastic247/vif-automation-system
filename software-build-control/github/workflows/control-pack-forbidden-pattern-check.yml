name: Control Pack Forbidden Pattern Check Template
on: workflow_dispatch
jobs:
  forbidden-pattern-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: python software-build-control/scripts/check_forbidden_patterns.py --root software-build-control
