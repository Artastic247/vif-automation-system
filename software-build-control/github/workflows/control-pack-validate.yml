name: Control Pack Validate Template
on: workflow_dispatch
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: python software-build-control/scripts/validate_control_pack.py --root software-build-control
