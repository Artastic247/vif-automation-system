name: Job card
body:
  - type: input
    id: objective
    attributes:
      label: Objective
  - type: textarea
    id: scope_in
    attributes:
      label: Scope in
  - type: textarea
    id: scope_out
    attributes:
      label: Scope out / prohibited changes
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and inputs
  - type: textarea
    id: verification
    attributes:
      label: Verification required
  - type: textarea
    id: rollback
    attributes:
      label: Rollback route
